<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PunnyCart | Reset Password</title>
  <link rel="shortcut icon" href="../Css/favicon.png" type="image/x-icon">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    * { transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease; }
    body { font-family: 'DM Sans', sans-serif; }
    .container-custom { max-width: 480px; margin: 0 auto; padding: 2rem; }
  </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900">
  <div class="min-h-screen flex items-center justify-center px-4">
    <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-8 w-full max-w-md">
      <div class="text-center mb-8">
        <div class="w-16 h-16 bg-indigo-100 dark:bg-indigo-900/30 rounded-full flex items-center justify-center mx-auto mb-4">
          <i class="fas fa-lock text-2xl text-indigo-600 dark:text-indigo-400"></i>
        </div>
        <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Reset Password</h1>
        <p class="text-gray-600 dark:text-gray-400 mt-2">Enter your new password below</p>
      </div>
      
      <form id="resetPasswordForm">
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
            <i class="fas fa-lock mr-2 text-indigo-500"></i>New Password
          </label>
          <div class="relative">
            <input type="password" id="newPassword" required
              class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none"
              placeholder="Enter new password">
            <button type="button" onclick="togglePassword('newPassword')"
              class="absolute right-3 top-3 text-gray-500 dark:text-gray-400">
              <i class="far fa-eye"></i>
            </button>
          </div>
        </div>
        
        <div class="mb-6">
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
            <i class="fas fa-lock mr-2 text-indigo-500"></i>Confirm Password
          </label>
          <div class="relative">
            <input type="password" id="confirmPassword" required
              class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none"
              placeholder="Confirm new password">
            <button type="button" onclick="togglePassword('confirmPassword')"
              class="absolute right-3 top-3 text-gray-500 dark:text-gray-400">
              <i class="far fa-eye"></i>
            </button>
          </div>
        </div>
        
        <button type="submit" id="resetBtn"
          class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-6 rounded-lg transition-all duration-300 transform hover:scale-105">
          <i class="fas fa-key mr-2"></i>Reset Password
        </button>
      </form>
      
      <div class="text-center mt-6">
        <a href="login.html" class="text-indigo-600 dark:text-indigo-400 hover:underline text-sm">
          <i class="fas fa-arrow-left mr-1"></i>Back to Login
        </a>
      </div>
    </div>
  </div>
  
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, confirmPasswordReset, verifyPasswordResetCode } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    
    const firebaseConfig = {
      apiKey: "AIzaSyDlkoedJh9k940IofE8VKJ9-fT8Gz7WvoI",
      authDomain: "e-commerce-29a73.firebaseapp.com",
      projectId: "e-commerce-29a73",
      storageBucket: "e-commerce-29a73.firebasestorage.app",
      messagingSenderId: "870933397259",
      appId: "1:870933397259:web:7a0d6f50a6a11f92b66c0e"
    };
    
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    
    const urlParams = new URLSearchParams(window.location.search);
    const mode = urlParams.get('mode');
    const oobCode = urlParams.get('oobCode');
    
    if (mode === 'resetPassword' && oobCode) {
      verifyPasswordResetCode(auth, oobCode).then((email) => {
        console.log('Reset code valid for:', email);
        sessionStorage.setItem('resetEmail', email);
        sessionStorage.setItem('resetCode', oobCode);
      }).catch((error) => {
        console.error('Invalid reset code:', error);
        Swal.fire({
          icon: 'error',
          title: 'Invalid Link',
          text: 'This password reset link is invalid or has expired. Please request a new one.',
          confirmButtonColor: '#4f46e5'
        }).then(() => {
          window.location.href = 'login.html';
        });
      });
    } else {
      Swal.fire({
        icon: 'error',
        title: 'Invalid Link',
        text: 'Invalid password reset link.',
        confirmButtonColor: '#4f46e5'
      }).then(() => {
        window.location.href = 'login.html';
      });
    }
    
    document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const resetCode = sessionStorage.getItem('resetCode');
      
      if (newPassword !== confirmPassword) {
        Swal.fire({ icon: 'error', title: 'Error', text: 'Passwords do not match' });
        return;
      }
      
      if (newPassword.length < 8) {
        Swal.fire({ icon: 'error', title: 'Error', text: 'Password must be at least 8 characters' });
        return;
      }
      
      const submitBtn = document.getElementById('resetBtn');
      submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Resetting...';
      submitBtn.disabled = true;
      
      try {
        await confirmPasswordReset(auth, resetCode, newPassword);
        sessionStorage.removeItem('resetCode');
        sessionStorage.removeItem('resetEmail');
        
        Swal.fire({
          icon: 'success',
          title: 'Password Reset!',
          text: 'Your password has been reset successfully. You can now log in.',
          confirmButtonColor: '#4f46e5'
        }).then(() => {
          window.location.href = 'login.html';
        });
      } catch (error) {
        console.error('Reset error:', error);
        Swal.fire({
          icon: 'error',
          title: 'Failed',
          text: error.message || 'Failed to reset password. Please try again.',
          confirmButtonColor: '#4f46e5'
        });
        submitBtn.innerHTML = '<i class="fas fa-key mr-2"></i>Reset Password';
        submitBtn.disabled = false;
      }
    });
    
    function togglePassword(inputId) {
      const input = document.getElementById(inputId);
      const icon = event.currentTarget.querySelector('i');
      if (input.type === 'password') {
        input.type = 'text';
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');
      } else {
        input.type = 'password';
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
      }
    }
    window.togglePassword = togglePassword;
  </script>
</body>
</html>
