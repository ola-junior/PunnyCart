<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PunnyCart | Reset Password</title>
  <link rel="shortcut icon" href="../Css/favicon.png" type="image/x-icon">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    * { transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease; }
    body { font-family: 'DM Sans', sans-serif; }
  </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900">
  <div class="min-h-screen flex items-center justify-center px-4">
    <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-8 w-full max-w-md">

      <!-- Icon + heading -->
      <div class="text-center mb-8">
        <div class="w-16 h-16 bg-indigo-100 dark:bg-indigo-900/30 rounded-full flex items-center justify-center mx-auto mb-4">
          <i class="fas fa-lock text-2xl text-indigo-600 dark:text-indigo-400"></i>
        </div>
        <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Reset Password</h1>
        <p class="text-gray-600 dark:text-gray-400 mt-2">Enter your new password below</p>
      </div>

      <!-- Loading state -->
      <div id="loading" class="text-center py-6">
        <div class="animate-spin rounded-full h-10 w-10 border-4 border-indigo-600 border-t-transparent mx-auto mb-3"></div>
        <p class="text-gray-500 dark:text-gray-400 text-sm">Validating reset link...</p>
      </div>

      <!-- Form (hidden until link is validated) -->
      <form id="resetPasswordForm" class="hidden">
        <!-- Email hint -->
        <div class="mb-5 p-3 bg-indigo-50 dark:bg-indigo-900/20 rounded-lg text-center">
          <p class="text-sm text-indigo-700 dark:text-indigo-300">
            Resetting password for <strong id="resetEmailHint"></strong>
          </p>
        </div>

        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
            <i class="fas fa-lock mr-2 text-indigo-500"></i>New Password
          </label>
          <div class="relative">
            <input type="password" id="newPassword" required minlength="8"
              class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none"
              placeholder="At least 8 characters">
            <button type="button" onclick="togglePassword('newPassword')"
              class="absolute right-3 top-3 text-gray-500 dark:text-gray-400 hover:text-indigo-600 transition">
              <i class="far fa-eye"></i>
            </button>
          </div>
        </div>

        <div class="mb-6">
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
            <i class="fas fa-lock mr-2 text-indigo-500"></i>Confirm Password
          </label>
          <div class="relative">
            <input type="password" id="confirmPassword" required
              class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none"
              placeholder="Repeat new password">
            <button type="button" onclick="togglePassword('confirmPassword')"
              class="absolute right-3 top-3 text-gray-500 dark:text-gray-400 hover:text-indigo-600 transition">
              <i class="far fa-eye"></i>
            </button>
          </div>
        </div>

        <button type="submit" id="resetBtn"
          class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-6 rounded-lg transition-all duration-300 transform hover:scale-105">
          <i class="fas fa-key mr-2"></i>Reset Password
        </button>
      </form>

      <div class="text-center mt-6">
        <a href="login.html" class="text-indigo-600 dark:text-indigo-400 hover:underline text-sm">
          <i class="fas fa-arrow-left mr-1"></i>Back to Login
        </a>
      </div>

    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, confirmPasswordReset, verifyPasswordResetCode } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDlkoedJh9k940IofE8VKJ9-fT8Gz7WvoI",
      authDomain: "e-commerce-29a73.firebaseapp.com",
      projectId: "e-commerce-29a73",
      storageBucket: "e-commerce-29a73.firebasestorage.app",
      messagingSenderId: "870933397259",
      appId: "1:870933397259:web:7a0d6f50a6a11f92b66c0e"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Read oobCode directly from URL — no sessionStorage needed
    const params = new URLSearchParams(window.location.search);
    const mode = params.get('mode');
    const oobCode = params.get('oobCode');

    const loading = document.getElementById('loading');
    const form = document.getElementById('resetPasswordForm');

    // --- Step 1: Validate the link on page load ---
    async function init() {
      if (mode !== 'resetPassword' || !oobCode) {
        loading.classList.add('hidden');
        await Swal.fire({
          icon: 'error',
          title: 'Invalid Link',
          text: 'This password reset link is invalid. Please request a new one.',
          confirmButtonColor: '#4f46e5'
        });
        window.location.href = 'login.html';
        return;
      }

      try {
        // Verify the code is still valid and get the email it belongs to
        const email = await verifyPasswordResetCode(auth, oobCode);
        document.getElementById('resetEmailHint').textContent = email;
        loading.classList.add('hidden');
        form.classList.remove('hidden');
      } catch (error) {
        console.error('Invalid reset code:', error);
        loading.classList.add('hidden');
        await Swal.fire({
          icon: 'error',
          title: 'Link Expired',
          text: 'This reset link has already been used or has expired. Please request a new one.',
          confirmButtonColor: '#4f46e5'
        });
        window.location.href = 'login.html';
      }
    }

    // --- Step 2: Handle form submission ---
    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const btn = document.getElementById('resetBtn');

      if (newPassword !== confirmPassword) {
        Swal.fire({ icon: 'error', title: 'Mismatch', text: 'Passwords do not match.', confirmButtonColor: '#4f46e5' });
        return;
      }

      if (newPassword.length < 8 || !/\d/.test(newPassword)) {
        Swal.fire({ icon: 'error', title: 'Weak Password', text: 'Password must be at least 8 characters and include a number.', confirmButtonColor: '#4f46e5' });
        return;
      }

      btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Resetting...';
      btn.disabled = true;

      try {
        // oobCode is still in scope from the URL — used exactly once here
        await confirmPasswordReset(auth, oobCode, newPassword);

        await Swal.fire({
          icon: 'success',
          title: 'Password Reset!',
          text: 'Your password has been updated. You can now log in.',
          confirmButtonColor: '#4f46e5'
        });

        window.location.href = 'login.html';

      } catch (error) {
        console.error('Reset error:', error);

        let msg = 'Failed to reset password. Please try again.';
        if (error.code === 'auth/invalid-action-code') msg = 'This link has already been used. Please request a new reset email.';
        else if (error.code === 'auth/expired-action-code') msg = 'This link has expired. Please request a new reset email.';
        else if (error.code === 'auth/weak-password') msg = 'Password is too weak. Please choose a stronger one.';

        Swal.fire({ icon: 'error', title: 'Failed', text: msg, confirmButtonColor: '#4f46e5' });

        btn.innerHTML = '<i class="fas fa-key mr-2"></i>Reset Password';
        btn.disabled = false;
      }
    });

    // --- Toggle password visibility ---
    window.togglePassword = function(inputId) {
      const input = document.getElementById(inputId);
      const icon = event.currentTarget.querySelector('i');
      const isHidden = input.type === 'password';
      input.type = isHidden ? 'text' : 'password';
      icon.classList.toggle('fa-eye', !isHidden);
      icon.classList.toggle('fa-eye-slash', isHidden);
    };

    init();
  </script>
</body>
</html>
