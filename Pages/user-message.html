  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, query, where, getDocs, addDoc, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDlkoedJh9k940IofE8VKJ9-fT8Gz7WvoI",
      authDomain: "e-commerce-29a73.firebaseapp.com",
      projectId: "e-commerce-29a73",
      storageBucket: "e-commerce-29a73.firebasestorage.app",
      messagingSenderId: "870933397259",
      appId: "1:870933397259:web:7a0d6f50a6a11f92b66c0e"
    };
    
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);

    let currentUser = null;
    let allMessages = [];
    let currentFilter = 'all';

    function formatDate(dateString) {
      if (!dateString) return 'N/A';
      const date = dateString.toDate ? dateString.toDate() : new Date(dateString);
      return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    function getSubjectDisplay(subjectKey) {
      const subjects = {
        'general': 'General Inquiry',
        'order': 'Order Status',
        'returns': 'Returns & Exchanges',
        'shipping': 'Shipping Information',
        'product': 'Product Question',
        'feedback': 'Feedback'
      };
      return subjects[subjectKey] || subjectKey;
    }

    function getSubjectBadge(subject) {
      const colors = {
        'general': 'bg-blue-100 text-blue-700 dark:bg-blue-900/30 dark:text-blue-400',
        'order': 'bg-purple-100 text-purple-700 dark:bg-purple-900/30 dark:text-purple-400',
        'returns': 'bg-red-100 text-red-700 dark:bg-red-900/30 dark:text-red-400',
        'shipping': 'bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-400',
        'product': 'bg-indigo-100 text-indigo-700 dark:bg-indigo-900/30 dark:text-indigo-400',
        'feedback': 'bg-pink-100 text-pink-700 dark:bg-pink-900/30 dark:text-pink-400'
      };
      return colors[subject] || 'bg-gray-100 text-gray-700 dark:bg-gray-800 dark:text-gray-400';
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }

    async function loadMessages() {
      if (!currentUser) return;
      
      try {
        const messagesQuery = query(
          collection(db, 'messages'),
          where('email', '==', currentUser.email)
        );
        
        const snapshot = await getDocs(messagesQuery);
        allMessages = [];
        snapshot.forEach(docSnap => {
          const data = docSnap.data();
          allMessages.push({
            id: docSnap.id,
            ...data,
            createdAt: data.createdAt || new Date()
          });
        });
        
        // Sort client-side by createdAt descending
        allMessages.sort((a, b) => {
          const dateA = a.createdAt.toDate ? a.createdAt.toDate() : new Date(a.createdAt);
          const dateB = b.createdAt.toDate ? b.createdAt.toDate() : new Date(b.createdAt);
          return dateB - dateA;
        });
        
        renderMessages();
        updateUnreadBadge();
      } catch (error) {
        console.error('Error loading messages:', error);
        Swal.fire('Error', 'Failed to load messages. Please try again.', 'error');
      }
    }

    function filterMessages(filter) {
      currentFilter = filter;
      
      ['all', 'unread', 'replied'].forEach(f => {
        const btn = document.getElementById(`filter${f.charAt(0).toUpperCase() + f.slice(1)}`);
        if (btn) {
          if (f === filter) {
            btn.className = 'px-4 py-2 text-sm font-medium border-b-2 border-indigo-600 text-indigo-600 dark:text-indigo-400 transition-all';
          } else {
            btn.className = 'px-4 py-2 text-sm font-medium border-b-2 border-transparent text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-300 transition-all';
          }
        }
      });
      
      renderMessages();
    }

    function renderMessages() {
      const container = document.getElementById('messagesList');
      
      let filteredMessages = [...allMessages];
      
      if (currentFilter === 'unread') {
        filteredMessages = filteredMessages.filter(m => m.status === 'unread');
      } else if (currentFilter === 'replied') {
        filteredMessages = filteredMessages.filter(m => m.replied === true);
      }
      
      if (filteredMessages.length === 0) {
        container.innerHTML = `
          <div class="text-center py-16">
            <i class="fas fa-inbox text-6xl text-gray-400 mb-4"></i>
            <h3 class="text-xl font-semibold text-gray-700 dark:text-gray-300 mb-2">No messages found</h3>
            <p class="text-gray-500 dark:text-gray-400">Click "New Message" to contact support</p>
          </div>
        `;
        return;
      }
      
      container.innerHTML = filteredMessages.map(message => {
        const subjectColor = getSubjectBadge(message.subject);
        const isUnread = message.status === 'unread';
        const createdAt = formatDate(message.createdAt);
        const subjectDisplay = getSubjectDisplay(message.subject);
        
        return `
          <div class="message-card bg-gray-50 dark:bg-gray-700/50 rounded-xl border border-gray-200 dark:border-gray-600 overflow-hidden hover:shadow-lg transition-all ${isUnread ? 'message-unread' : ''}">
            <div class="p-5">
              <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3 mb-4">
                <div class="flex items-center gap-3">
                  <div class="w-10 h-10 rounded-full bg-indigo-100 dark:bg-indigo-900/30 flex items-center justify-center">
                    <i class="fas fa-envelope text-indigo-500 text-sm"></i>
                  </div>
                  <div>
                    <p class="font-semibold text-gray-900 dark:text-white">${escapeHtml(subjectDisplay)}</p>
                    <p class="text-xs text-gray-500 mt-0.5">${createdAt}</p>
                  </div>
                </div>
                <div class="flex items-center gap-2">
                  <span class="px-2 py-1 rounded-lg text-xs font-medium ${subjectColor}">${escapeHtml(subjectDisplay)}</span>
                  ${isUnread ? '<span class="px-2 py-1 rounded-lg text-xs font-medium bg-yellow-100 text-yellow-700 dark:bg-yellow-900/30 dark:text-yellow-400"><i class="fas fa-circle text-[8px] mr-1"></i>Unread</span>' : ''}
                  ${message.replied ? '<span class="px-2 py-1 rounded-lg text-xs font-medium bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-400"><i class="fas fa-check-circle text-xs mr-1"></i>Replied</span>' : ''}
                </div>
              </div>
              
              <div class="mb-4">
                <p class="text-gray-600 dark:text-gray-400 text-sm leading-relaxed">${escapeHtml(message.message || 'No message content')}</p>
              </div>
              
              ${message.replyMessage ? `
                <div class="mb-4 bg-indigo-50 dark:bg-indigo-900/20 rounded-xl p-4 border-l-4 border-indigo-500">
                  <div class="flex items-center gap-2 mb-2">
                    <i class="fas fa-reply text-indigo-500 text-sm"></i>
                    <span class="text-xs font-semibold text-indigo-600 dark:text-indigo-400">Support Team Reply</span>
                    <span class="text-xs text-gray-500">${formatDate(message.repliedAt)}</span>
                  </div>
                  <p class="text-gray-700 dark:text-gray-300 text-sm leading-relaxed">${escapeHtml(message.replyMessage)}</p>
                  <p class="text-xs text-gray-500 mt-2">Replied by: ${escapeHtml(message.repliedBy || 'Support Team')}</p>
                </div>
              ` : ''}
              
              <div class="flex justify-end gap-2 pt-2">
                ${isUnread ? `
                  <button onclick="markAsRead('${message.id}')" class="px-3 py-1.5 text-xs font-medium rounded-lg bg-gray-100 text-gray-700 hover:bg-gray-200 dark:bg-gray-700 dark:text-gray-300 dark:hover:bg-gray-600 transition-colors">
                    <i class="fas fa-check mr-1"></i> Mark as Read
                  </button>
                ` : ''}
                <button onclick="viewMessageDetails('${message.id}')" class="px-3 py-1.5 text-xs font-medium rounded-lg bg-indigo-100 text-indigo-600 hover:bg-indigo-200 dark:bg-indigo-900/30 dark:text-indigo-400 dark:hover:bg-indigo-900/50 transition-colors">
                  <i class="fas fa-eye mr-1"></i> View Details
                </button>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    window.viewMessageDetails = async (messageId) => {
      const message = allMessages.find(m => m.id === messageId);
      if (!message) return;
      
      if (message.status === 'unread') {
        await markAsRead(messageId);
      }
      
      const subjectDisplay = getSubjectDisplay(message.subject);
      const createdAt = formatDate(message.createdAt);
      
      Swal.fire({
        title: 'Message Details',
        html: `
          <div class="text-left">
            <div class="mb-4">
              <p class="text-sm text-gray-500 mb-1">Subject</p>
              <p class="font-semibold text-gray-800 dark:text-gray-200">${escapeHtml(subjectDisplay)}</p>
            </div>
            <div class="mb-4">
              <p class="text-sm text-gray-500 mb-1">Date Sent</p>
              <p class="text-gray-800 dark:text-gray-200">${createdAt}</p>
            </div>
            <div class="mb-4">
              <p class="text-sm text-gray-500 mb-1">Status</p>
              <p class="text-gray-800 dark:text-gray-200">${message.status === 'unread' ? 'Unread' : 'Read'} ${message.replied ? '· Replied' : ''}</p>
            </div>
            <div class="mb-4">
              <p class="text-sm text-gray-500 mb-1">Your Message</p>
              <div class="bg-gray-50 dark:bg-gray-800 p-3 rounded-xl text-gray-700 dark:text-gray-300 text-sm whitespace-pre-wrap">${escapeHtml(message.message)}</div>
            </div>
            ${message.replyMessage ? `
              <div class="mb-4">
                <p class="text-sm text-gray-500 mb-1">Support Reply</p>
                <div class="bg-indigo-50 dark:bg-indigo-900/20 p-3 rounded-xl text-gray-700 dark:text-gray-300 text-sm whitespace-pre-wrap">
                  ${escapeHtml(message.replyMessage)}
                  <p class="text-xs text-gray-500 mt-2">Replied on ${formatDate(message.repliedAt)}</p>
                </div>
              </div>
            ` : ''}
          </div>
        `,
        confirmButtonText: 'Close',
        confirmButtonColor: '#4f46e5'
      });
    };

    window.markAsRead = async (messageId) => {
      try {
        await updateDoc(doc(db, 'messages', messageId), { status: 'read' });
        const message = allMessages.find(m => m.id === messageId);
        if (message) message.status = 'read';
        renderMessages();
        updateUnreadBadge();
      } catch (error) {
        console.error('Error marking as read:', error);
      }
    };

    window.openNewMessageModal = () => {
      document.getElementById('newMessageModal').classList.remove('hidden');
      document.getElementById('newMessageModal').classList.add('flex');
    };

    window.closeNewMessageModal = () => {
      document.getElementById('newMessageModal').classList.add('hidden');
      document.getElementById('newMessageModal').classList.remove('flex');
      document.getElementById('messageSubject').value = 'general';
      document.getElementById('messageContent').value = '';
    };

    window.sendNewMessage = async () => {
      const subject = document.getElementById('messageSubject').value;
      const message = document.getElementById('messageContent').value.trim();
      
      if (!message) {
        Swal.fire('Error', 'Please enter a message', 'error');
        return;
      }
      
      try {
        await addDoc(collection(db, 'messages'), {
          fullName: currentUser.displayName || currentUser.email.split('@')[0],
          email: currentUser.email,
          subject: subject,
          message: message,
          status: 'unread',
          replied: false,
          createdAt: new Date(),
          userId: currentUser.uid
        });
        
        closeNewMessageModal();
        Swal.fire('Success', 'Your message has been sent. Our support team will respond shortly.', 'success');
        loadMessages();
      } catch (error) {
        console.error('Error sending message:', error);
        Swal.fire('Error', 'Failed to send message. Please try again.', 'error');
      }
    };

    function updateUnreadBadge() {
      const unreadCount = allMessages.filter(m => m.status === 'unread').length;
      const sidebarBadge = document.getElementById('sidebarUnreadBadge');
      if (sidebarBadge) {
        if (unreadCount > 0) {
          sidebarBadge.textContent = unreadCount;
          sidebarBadge.classList.remove('hidden');
        } else {
          sidebarBadge.classList.add('hidden');
        }
      }
    }

    async function updateProfileUI(user) {
      const nameElement = document.getElementById('profileName');
      const emailElement = document.getElementById('profileEmail');
      const avatarElement = document.getElementById('profileAvatar');
      
      if (nameElement) {
        nameElement.textContent = user.displayName || user.email.split('@')[0];
      }
      if (emailElement) {
        emailElement.textContent = user.email;
      }
      
      // Try to get profile picture from localStorage or user data
      if (avatarElement) {
        const savedAvatar = localStorage.getItem(`avatar_${user.uid}`);
        if (savedAvatar) {
          avatarElement.src = savedAvatar;
        } else {
          // Use initial avatar like orders page
          const initial = (user.displayName || user.email)[0].toUpperCase();
          avatarElement.src = `https://ui-avatars.com/api/?name=${initial}&background=4f46e5&color=fff&bold=true&size=96&length=1`;
        }
      }
    }

    window.logout = async () => {
      await signOut(auth);
      window.location.href = '../index.html';
    };

    onAuthStateChanged(auth, (user) => {
      if (user) {
        currentUser = user;
        updateProfileUI(user);
        loadMessages();
      } else {
        window.location.href = '../index.html';
      }
    });

    const mobileMenuToggle = document.getElementById('mobileMenuToggle');
    const mobileMenu = document.getElementById('mobileMenu');
    
    if (mobileMenuToggle) {
      mobileMenuToggle.addEventListener('click', () => {
        mobileMenu.classList.toggle('hidden');
      });
    }

    const backToTop = document.getElementById('backToTop');
    window.addEventListener('scroll', () => {
      if (window.pageYOffset > 300) {
        backToTop.classList.remove('opacity-0', 'invisible');
        backToTop.classList.add('opacity-100', 'visible');
      } else {
        backToTop.classList.add('opacity-0', 'invisible');
        backToTop.classList.remove('opacity-100', 'visible');
      }
    });
    
    if (backToTop) {
      backToTop.addEventListener('click', () => {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    }

    window.filterMessages = filterMessages;
    window.markAsRead = markAsRead;
    window.viewMessageDetails = viewMessageDetails;
    window.openNewMessageModal = openNewMessageModal;
    window.closeNewMessageModal = closeNewMessageModal;
    window.sendNewMessage = sendNewMessage;
  </script>
</body>
<script type="module" src="../Javascript/auth.js"></script>
<script type="module" src="../Javascript/wishlist.js"></script>
</html>
