<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PunnyCart | Email Action</title>
  <link rel="shortcut icon" href="../Css/favicon.png" type="image/x-icon">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { transition: background-color 0.3s ease, color 0.3s ease; }
    body { font-family: 'DM Sans', sans-serif; }
  </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen flex items-center justify-center p-4">

  <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-10 max-w-md w-full text-center">

    <!-- Loading -->
    <div id="loading">
      <div class="animate-spin rounded-full h-12 w-12 border-4 border-indigo-600 border-t-transparent mx-auto mb-4"></div>
      <p class="text-gray-500 dark:text-gray-400">Please wait...</p>
    </div>

    <!-- Success (email verified) -->
    <div id="success" class="hidden">
      <div class="w-16 h-16 bg-green-100 dark:bg-green-900/30 rounded-full flex items-center justify-center mx-auto mb-4">
        <i class="fas fa-check text-2xl text-green-600 dark:text-green-400"></i>
      </div>
      <h1 class="text-2xl font-bold text-gray-900 dark:text-white mb-2">Email Verified!</h1>
      <p class="text-gray-600 dark:text-gray-400 mb-6">Your email has been successfully verified. You can now sign in.</p>
      <a href="login.html"
        class="inline-block bg-indigo-600 hover:bg-indigo-700 text-white font-semibold px-8 py-3 rounded-lg transition-all duration-300 transform hover:scale-105">
        <i class="fas fa-sign-in-alt mr-2"></i>Go to Login
      </a>
    </div>

    <!-- Redirecting (password reset) -->
    <div id="redirecting" class="hidden">
      <div class="w-16 h-16 bg-indigo-100 dark:bg-indigo-900/30 rounded-full flex items-center justify-center mx-auto mb-4">
        <i class="fas fa-key text-2xl text-indigo-600 dark:text-indigo-400"></i>
      </div>
      <h1 class="text-2xl font-bold text-gray-900 dark:text-white mb-2">Redirecting...</h1>
      <p class="text-gray-600 dark:text-gray-400">Taking you to the password reset page.</p>
    </div>

    <!-- Error -->
    <div id="error" class="hidden">
      <div class="w-16 h-16 bg-red-100 dark:bg-red-900/30 rounded-full flex items-center justify-center mx-auto mb-4">
        <i class="fas fa-times text-2xl text-red-600 dark:text-red-400"></i>
      </div>
      <h1 class="text-2xl font-bold text-gray-900 dark:text-white mb-2">Something went wrong</h1>
      <p id="errorMsg" class="text-gray-600 dark:text-gray-400 mb-6">The link is invalid or has expired.</p>
      <a href="login.html"
        class="inline-block bg-indigo-600 hover:bg-indigo-700 text-white font-semibold px-8 py-3 rounded-lg transition-all duration-300 transform hover:scale-105">
        <i class="fas fa-arrow-left mr-2"></i>Back to Login
      </a>
    </div>

  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, applyActionCode } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDlkoedJh9k940IofE8VKJ9-fT8Gz7WvoI",
      authDomain: "e-commerce-29a73.firebaseapp.com",
      projectId: "e-commerce-29a73",
      storageBucket: "e-commerce-29a73.firebasestorage.app",
      messagingSenderId: "870933397259",
      appId: "1:870933397259:web:7a0d6f50a6a11f92b66c0e"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    function show(id) {
      ['loading', 'success', 'redirecting', 'error'].forEach(s => {
        document.getElementById(s).classList.toggle('hidden', s !== id);
      });
    }

    async function handleAction() {
      const params = new URLSearchParams(window.location.search);
      const mode = params.get('mode');
      const oobCode = params.get('oobCode');

      // No mode or code — invalid link
      if (!mode || !oobCode) {
        document.getElementById('errorMsg').textContent = 'Invalid or missing link. Please request a new one.';
        show('error');
        return;
      }

      try {

        if (mode === 'verifyEmail') {
          await applyActionCode(auth, oobCode);

          // If user is signed in, sync Firestore immediately
          const user = auth.currentUser;
          if (user) {
            await user.reload();
            try {
              await updateDoc(doc(db, 'users', user.uid), { emailVerified: true });
            } catch (_) {
              // Not critical — syncs automatically on next login
            }
          }

          show('success');

        } else if (mode === 'resetPassword') {
          // Hand off the oobCode to reset-password.html — it does the rest
          show('redirecting');
          window.location.href = `reset-password.html?mode=resetPassword&oobCode=${encodeURIComponent(oobCode)}`;

        } else if (mode === 'recoverEmail') {
          await applyActionCode(auth, oobCode);
          document.getElementById('errorMsg').textContent = 'Your email has been recovered. Please log in.';
          show('error');
          setTimeout(() => window.location.href = 'login.html', 3000);

        } else {
          document.getElementById('errorMsg').textContent = 'Unknown action. Please try again.';
          show('error');
        }

      } catch (error) {
        console.error('Action error:', error);

        let msg = 'Something went wrong. Please request a new link.';
        if (error.code === 'auth/invalid-action-code') msg = 'This link has already been used or has expired.';
        else if (error.code === 'auth/expired-action-code') msg = 'This link has expired. Please request a new one.';
        else if (error.code === 'auth/user-disabled') msg = 'This account has been disabled.';

        document.getElementById('errorMsg').textContent = msg;
        show('error');
      }
    }

    handleAction();
  </script>

</body>
</html>
