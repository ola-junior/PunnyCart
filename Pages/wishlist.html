<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>PunnyCart | My Wishlist</title>

  <meta name="description"
    content="View and manage your wishlist items at PunnyCart. Save your favorite products for later purchase.">
  <meta name="keywords" content="wishlist, saved items, punnycart, favorite products">
  <meta name="author" content="PunnyCart">

  <meta property="og:title" content="PunnyCart | My Wishlist">
  <meta property="og:description" content="View and manage your wishlist items at PunnyCart.">
  <meta property="og:image" content="https://images.unsplash.com/photo-1472851294608-062f824d29cc?w=1200&auto=format">
  <meta property="og:url" content="https://PunnyCart.com/Pages/wishlist.html">
  <meta property="og:type" content="website">

  <link rel="shortcut icon" href="../Css/favicon.png" type="image/x-icon">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet" />

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#4f46e5',
            secondary: '#7c3aed',
          },
          fontFamily: {
            sans: ['DM Sans', 'sans-serif'],
            display: ['Syne', 'sans-serif'],
          },
          animation: {
            'bounce-slow': 'bounce-slow 3s infinite',
          }
        }
      }
    }
  </script>

  <link rel="stylesheet" href="../Css/style.css">

  <style>
    @keyframes bounce-slow {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .animate-bounce-slow {
      animation: bounce-slow 4s infinite;
    }

    * {
      transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease;
    }

    ::-webkit-scrollbar {
      width: 10px;
    }

    ::-webkit-scrollbar-track {
      background: #f1f1f1;
    }

    ::-webkit-scrollbar-thumb {
      background: #888;
      border-radius: 5px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #555;
    }

    .dark ::-webkit-scrollbar-track {
      background: #1f2937 !important;
    }

    .dark ::-webkit-scrollbar-thumb {
      background: #4b5563 !important;
      border-radius: 5px;
    }

    .dark ::-webkit-scrollbar-thumb:hover {
      background: #6b7280 !important;
    }

    .wishlist-item {
      transition: all 0.3s ease;
    }

    .wishlist-item:hover .remove-btn {
      opacity: 1;
    }

    .nav-link {
      position: relative;
    }

    .nav-link::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 0;
      height: 2px;
      background: #4f46e5;
      transition: width 0.3s ease;
    }

    .nav-link:hover::after,
    .nav-link.active::after {
      width: 100%;
    }

    .dark .nav-link::after {
      background: #818cf8;
    }
  </style>
</head>

<body class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-white">

  <header class="sticky top-0 bg-white/95 dark:bg-gray-800/95 backdrop-blur-sm shadow-lg z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16 md:h-20">

        <a href="../index.html" class="flex items-center flex-shrink-0 group">
          <span class="text-xl md:text-2xl font-bold text-indigo-600 dark:text-indigo-400 group-hover:scale-105 transition-transform duration-300">
            Punny<span class="text-purple-600 dark:text-purple-400">Cart</span>
          </span>
        </a>

        <div class="flex items-center space-x-2 sm:space-x-4">
          <nav class="hidden md:flex items-center space-x-8 mr-4">
            <a href="../index.html" class="nav-link text-gray-700 dark:text-gray-200 hover:text-indigo-600 dark:hover:text-indigo-400 font-medium">Home</a>
            <a href="./shop.html" class="nav-link text-gray-700 dark:text-gray-200 hover:text-indigo-600 dark:hover:text-indigo-400 font-medium">Shop</a>
            <a href="./about.html" class="nav-link text-gray-700 dark:text-gray-200 hover:text-indigo-600 dark:hover:text-indigo-400 font-medium">About</a>
            <a href="./blog-landing.html" class="nav-link text-gray-700 dark:text-gray-200 hover:text-indigo-600 dark:hover:text-indigo-400 font-medium">Blog</a>
            <a href="./faq.html" class="nav-link text-gray-700 dark:text-gray-200 hover:text-indigo-600 dark:hover:text-indigo-400 font-medium">FAQ</a>
            <a href="./contact.html" class="nav-link text-gray-700 dark:text-gray-200 hover:text-indigo-600 dark:hover:text-indigo-400 font-medium">Contact</a>
            <div id="authSection" class="inline-block"></div>
          </nav>

          <div id="mobileProfileIcon" class="md:hidden hidden"></div>

          <button onclick="window.location.href='./cart.html'"
            class="cart-button relative p-1.5 sm:p-2 text-gray-600 dark:text-gray-300 hover:text-indigo-600 dark:hover:text-indigo-400 transition-colors">
            <svg class="w-5 h-5 sm:w-6 sm:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
            </svg>
            <span class="cart-badge absolute -top-1 -right-1 bg-indigo-600 text-white text-xs rounded-full h-4 w-4 sm:h-5 sm:w-5 flex items-center justify-center text-[10px] sm:text-xs hidden">0</span>
          </button>

          <button id="darkToggle"
            class="p-2 rounded-lg bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors">
            <i id="themeIcon" class="fas fa-moon text-sm"></i>
          </button>

          <button id="mobileMenuToggle"
            class="md:hidden bg-gray-200 dark:bg-gray-700 p-1.5 sm:p-2.5 rounded-lg hover:bg-gray-300 dark:hover:bg-gray-600 transition-all duration-300 focus:ring-4 focus:ring-gray-300 dark:focus:ring-gray-600">
            <svg class="w-5 h-5 sm:w-6 sm:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
          </button>
        </div>
      </div>

      <div id="mobileMenu" class="md:hidden hidden py-4 border-t border-gray-200 dark:border-gray-700">
        <nav class="flex flex-col space-y-4" id="mobileNav">
          <a href="../index.html" class="mobile-nav-link text-gray-700 dark:text-gray-200 hover:text-indigo-600 dark:hover:text-indigo-400 font-medium px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg transition-all">Home</a>
          <a href="./shop.html" class="mobile-nav-link text-gray-700 dark:text-gray-200 hover:text-indigo-600 dark:hover:text-indigo-400 font-medium px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg transition-all">Shop</a>
          <a href="./about.html" class="mobile-nav-link text-gray-700 dark:text-gray-200 hover:text-indigo-600 dark:hover:text-indigo-400 font-medium px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg transition-all">About</a>
          <a href="./blog-landing.html" class="mobile-nav-link text-gray-700 dark:text-gray-200 hover:text-indigo-600 dark:hover:text-indigo-400 font-medium px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg transition-all">Blog</a>
          <a href="./faq.html" class="mobile-nav-link text-gray-700 dark:text-gray-200 hover:text-indigo-600 dark:hover:text-indigo-400 font-medium px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg transition-all">FAQ</a>
          <a href="./contact.html" class="mobile-nav-link text-gray-700 dark:text-gray-200 hover:text-indigo-600 dark:hover:text-indigo-400 font-medium px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg transition-all">Contact</a>
          <div id="mobileAuthSection"></div>
        </nav>
      </div>
    </div>
  </header>

  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
    <div class="flex flex-col lg:flex-row gap-8">
      <div class="lg:w-1/4">
        <div class="bg-white dark:bg-gray-800 rounded-xl shadow-lg p-6">
          <div class="text-center mb-6">
            <img id="profileAvatar" src="" alt="Profile"
              class="w-24 h-24 rounded-full mx-auto mb-4 border-4 border-indigo-600 object-cover">
            <h2 id="profileName" class="text-xl font-bold truncate">Loading...</h2>
            <p id="profileEmail" class="text-gray-500 dark:text-gray-400 text-sm truncate">Loading...</p>
          </div>

          <nav class="space-y-2">
            <a href="profile.html"
              class="flex items-center px-4 py-3 text-gray-700 dark:text-gray-300 hover:bg-indigo-50 dark:hover:bg-indigo-900/20 rounded-lg transition-colors">
              <i class="fas fa-user mr-3 text-indigo-600 w-5"></i>My Profile
            </a>
             <a href="user-message.html"
                class="flex items-center px-3 sm:px-4 py-2 sm:py-3 text-gray-700 dark:text-gray-300 hover:bg-indigo-50 dark:hover:bg-indigo-900/20 rounded-lg transition-colors text-sm sm:text-base">
                <i class="fas fa-envelope mr-3 w-4"></i><span class="truncate">My Messages</span>
                <span id="sidebarUnreadBadge" class="ml-auto text-xs bg-red-500 text-white rounded-full px-2 py-0.5 hidden">0</span>
              </a>
            <a href="orders.html"
              class="flex items-center px-4 py-3 text-gray-700 dark:text-gray-300 hover:bg-indigo-50 dark:hover:bg-indigo-900/20 rounded-lg transition-colors">
              <i class="fas fa-shopping-bag mr-3 text-indigo-600 w-5"></i>My Orders
            </a>
            <a href="wishlist.html"
              class="flex items-center px-4 py-3 bg-indigo-50 dark:bg-indigo-900/20 text-indigo-600 dark:text-indigo-400 rounded-lg font-medium">
              <i class="fas fa-heart mr-3 text-red-500 w-5"></i>Wishlist
            </a>
            <a href="settings.html"
              class="flex items-center px-4 py-3 text-gray-700 dark:text-gray-300 hover:bg-indigo-50 dark:hover:bg-indigo-900/20 rounded-lg transition-colors">
              <i class="fas fa-cog mr-3 text-indigo-600 w-5"></i>Settings
            </a>
            <button onclick="window.logout()"
              class="flex items-center w-full px-4 py-3 text-red-600 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-lg transition-colors">
              <i class="fas fa-sign-out-alt mr-3 w-5"></i>Sign Out
            </button>
          </nav>
        </div>
      </div>

      <div class="lg:w-3/4">
        <div class="bg-white dark:bg-gray-800 rounded-xl shadow-lg p-8">
          <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold">My Wishlist</h1>
            <span class="text-sm text-gray-500 dark:text-gray-400" id="wishlistCount">0 items</span>
          </div>

          <div id="wishlistItems" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Wishlist items will be loaded here dynamically -->
          </div>

          <div id="emptyWishlist" class="hidden text-center py-16">
            <svg class="w-24 h-24 mx-auto text-gray-300 dark:text-gray-600 mb-4" fill="none" stroke="currentColor"
              viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
            </svg>
            <h3 class="text-xl font-semibold mb-2">Your wishlist is empty</h3>
            <p class="text-gray-600 dark:text-gray-400 mb-6">Save your favorite items to wishlist and they'll appear
              here.</p>
            <a href="./shop.html"
              class="inline-block bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-8 rounded-lg transition-all duration-300 transform hover:scale-105">
              Browse Products
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <button id="backToTop"
    class="fixed bottom-8 right-8 bg-indigo-600 text-white p-3 rounded-full shadow-lg opacity-0 invisible transition-all duration-300 hover:bg-indigo-700 hover:scale-110 focus:ring-4 focus:ring-indigo-300 z-50">
    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18" />
    </svg>
  </button>

  <script type="module" src="../Javascript/wishlist.js"></script>
  <script type="module" src="../Javascript/auth.js"></script>
</body>

</html>
